<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH 캐치프레이즈 에디터 (수정 버전)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        /* 기본 UI (화이트 테마) 변수 */
        :root {
            --bg-main: #f3f4f6;       /* 페이지 배경 (아주 밝은 회색) */
            --bg-panel: #ffffff;      /* 에디터 배경 (흰색) */
            --border-color-ui: #e5e7eb;  /* 테두리 색상 */
            --text-main: #1f2937;     /* 기본 텍스트 (거의 검은색) */
            --text-sub: #6b7280;      /* 보조 텍스트 */
            --input-bg: #f9fafb;      /* 입력칸 배경 */
        }

        /* 프리뷰 카드 커스텀 컬러 변수 */
        #captureArea {
            --fallback-bg: #d1d5db;     /* 기본 회색 배경 */
            --gradient-base: #000000;   /* 하단 그라데이션 베이스 색상 (검정) */
            --badge-bg: #E91E63;        /* 뱃지 배경색 */
            --badge-text: #ffffff;      /* 뱃지 텍스트색 */
            --card-primary-text: #ffffff; /* 이름, 캐치프레이즈 텍스트색 */
            --threat-level-text: #E91E63; /* 위협 등급 텍스트색 */
            --border-color: #E91E63;    /* 하단 선 색상 (Class 색상과 동기화) */
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            flex-wrap: wrap;
        }

        /* 1. 왼쪽: 미니멀 에디터 패널 */
        .editor-panel {
            background-color: var(--bg-panel);
            padding: 32px;
            border-radius: 20px;
            width: 380px;
            border: 1px solid var(--border-color-ui);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .editor-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color-ui);
        }

        .editor-header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
        }

        .editor-section {
            margin-bottom: 25px;
        }

        .editor-section-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color-ui);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-group input[type="text"], 
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color-ui);
            background-color: var(--input-bg);
            color: var(--text-main);
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .form-group input[type="file"] {
            width: 100%;
            padding: 10px 0;
            font-size: 14px;
            color: var(--text-sub);
            cursor: pointer;
        }

        .color-picker-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .color-picker-item {
            display: flex;
            align-items: center;
            gap: 8px;
            width: calc(50% - 6px);
            margin-bottom: 5px;
        }

        .color-picker-item input[type="color"] {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            padding: 0;
            cursor: pointer;
            box-shadow: inset 0 0 0 1px var(--border-color-ui);
        }

        .color-picker-item label {
            font-size: 13px;
            color: var(--text-sub);
            margin: 0;
            flex: 1;
        }

        .form-group input[type="text"]:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
        }

        .form-group textarea {
            resize: none;
            line-height: 1.6;
        }

        .download-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--text-main);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s, transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(17, 24, 39, 0.1);
        }

        .download-btn:hover {
            background-color: #111827;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(17, 24, 39, 0.15);
        }

        /* 2. 오른쪽: 결과물 카드 */
        .preview-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phrase-container {
            width: 800px;
            height: 600px;
            position: relative;
            background-color: var(--fallback-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            border-bottom: 20px solid var(--border-color);
        }

        .character-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            display: none;
        }

        .text-overlay-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%;
            background: linear-gradient(to bottom, transparent, var(--gradient-base));
            z-index: 2;
            pointer-events: none;
        }

        .text-content-container {
            position: absolute;
            bottom: 40px;
            left: 50px;
            right: 50px;
            z-index: 3;
            text-align: left;
        }

        .preview-text-shadow {
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        .class-badge {
            position: absolute;
            top: 40px;
            right: 40px;
            background-color: var(--badge-bg);
            color: var(--badge-text);
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 800;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            z-index: 4;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .hidden { display: none !important; }

        /* [수정] THREAT LEVEL 글씨 두께 강화 */
        .threat-level {
            display: inline-block;
            margin-bottom: 14px;
            font-size: 17px;
            font-weight: 800; /* 기존 700에서 800으로 변경 */
            color: var(--threat-level-text);
            text-transform: uppercase;
            letter-spacing: 1.8px;
            border: none; 
            padding: 0;
        }

        .character-name {
            font-size: 88px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin: 0 0 18px 0;
            line-height: 1;
            color: var(--card-primary-text);
        }

        /* [수정] 캐치프레이즈 글씨 두께 및 크기 축소 */
        .catchphrase {
            font-size: 15px; /* 기존 20px에서 축소 */
            line-height: 1.8;
            margin: 0;
            color: var(--card-primary-text);
            opacity: 0.98;
            white-space: pre-wrap;
            font-weight: 300; /* 기존 400에서 300으로 변경 */
            word-break: keep-all;
        }
    </style>
</head>
<body>

    <div class="editor-panel">
        <div class="editor-header">
            <h1>ARCH 캐치프레이즈 에디터</h1>
        </div>

        <div class="editor-section">
            <h2 class="editor-section-title">1. 콘텐츠 입력</h2>
            <div class="form-group">
                <label>배경 이미지 업로드</label>
                <input type="file" id="imgInput" accept="image/*">
            </div>
            <div class="form-group">
                <label>CLASS</label>
                <input type="text" id="classInput" value="S-CLASS ENTITY">
            </div>
            <div class="form-group">
                <label>위협 등급 (THREAT LEVEL)</label>
                <input type="text" id="threatInput" placeholder="예: CHAOTIC">
            </div>
            <div class="form-group">
                <label>이름 (NAME)</label>
                <input type="text" id="nameInput" placeholder="이름을 입력하세요">
            </div>
            <div class="form-group">
                <label>캐치프레이즈</label>
                <textarea id="phraseInput" rows="5" placeholder="캐치프레이즈를 입력하세요 (엔터 줄바꿈)"></textarea>
            </div>
        </div>

        <div class="editor-section">
            <h2 class="editor-section-title">2. 디자인 커스텀 (색상)</h2>
            <div class="color-picker-group">
                <div class="color-picker-item">
                    <input type="color" id="badgeBgInput" value="#E91E63">
                    <label>뱃지 배경색</label>
                </div>
                <div class="color-picker-item">
                    <input type="color" id="badgeTextInput" value="#ffffff">
                    <label>뱃지 텍스트색</label>
                </div>
                <div class="color-picker-item">
                    <input type="color" id="cardPrimaryTextInput" value="#ffffff">
                    <label>이름 & 캐치프레이즈색</label>
                </div>
                <div class="color-picker-item">
                    <input type="color" id="threatLevelInput" value="#E91E63">
                    <label>위협 등급색</label>
                </div>
            </div>
        </div>
        <button class="download-btn" id="downloadBtn">고화질 이미지 저장</button>
    </div>

    <div class="preview-panel">
        <div class="phrase-container" id="captureArea">
            <img src="" alt="" class="character-image" id="previewImg">
            <div class="text-overlay-bottom"></div>
            <div class="class-badge hidden preview-text-shadow" id="previewClassBadge"></div>
            <div class="text-content-container">
                <div class="threat-level hidden preview-text-shadow" id="previewThreatBox">[ THREAT LEVEL: <span id="previewThreat"></span> ]</div>
                <h1 class="character-name preview-text-shadow" id="previewName"></h1>
                <p class="catchphrase preview-text-shadow" id="previewPhrase"></p>
            </div>
        </div>
    </div>

    <script>
        function syncColor(inputId, cssVarName) {
            const picker = document.getElementById(inputId);
            picker.addEventListener('input', (e) => {
                document.getElementById('captureArea').style.setProperty(cssVarName, e.target.value);
            });
            document.getElementById('captureArea').style.setProperty(cssVarName, picker.value);
        }

        const badgePicker = document.getElementById('badgeBgInput');
        badgePicker.addEventListener('input', (e) => {
            const color = e.target.value;
            document.getElementById('captureArea').style.setProperty('--badge-bg', color);
            document.getElementById('captureArea').style.setProperty('--border-color', color);
        });
        document.getElementById('captureArea').style.setProperty('--badge-bg', badgePicker.value);
        document.getElementById('captureArea').style.setProperty('--border-color', badgePicker.value);

        syncColor('badgeTextInput', '--badge-text');
        syncColor('cardPrimaryTextInput', '--card-primary-text');
        syncColor('threatLevelInput', '--threat-level-text');

        document.getElementById('imgInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const imgEl = document.getElementById('previewImg');
                    imgEl.src = event.target.result;
                    imgEl.style.display = 'block'; 
                }
                reader.readAsDataURL(file);
            }
        });

        function syncText(inputId, previewId, wrapperId = null) {
            document.getElementById(inputId).addEventListener('input', (e) => {
                const value = e.target.value;
                const previewEl = document.getElementById(previewId);
                const wrapperEl = wrapperId ? document.getElementById(wrapperId) : previewEl;
                previewEl.innerText = value;
                if (value.trim() === '') {
                    wrapperEl.classList.add('hidden');
                } else {
                    wrapperEl.classList.remove('hidden');
                }
            });
        }

        document.getElementById('previewClassBadge').innerText = document.getElementById('classInput').value;
        if (document.getElementById('classInput').value.trim() !== '') {
            document.getElementById('previewClassBadge').classList.remove('hidden');
        }

        syncText('classInput', 'previewClassBadge');
        syncText('threatInput', 'previewThreat', 'previewThreatBox');
        syncText('nameInput', 'previewName');
        syncText('phraseInput', 'previewPhrase');

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const captureArea = document.getElementById('captureArea');
            const btn = document.getElementById('downloadBtn');
            const nameValue = document.getElementById('nameInput').value || '캐치프레이즈';
            btn.innerText = "저장 중...";
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none";
            html2canvas(captureArea, { scale: 3, backgroundColor: null, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = nameValue + '_포스터.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                btn.innerText = "고화질 이미지 저장";
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
            });
        });
    </script>
</body>
</html>
