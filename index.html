<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH 캐치프레이즈 에디터 (커스텀 컬러 & 화이트 UI)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        /* 기본 UI (화이트 테마) 변수 */
        :root {
            --bg-main: #f3f4f6;       /* 전체 배경 (아주 밝은 회색) */
            --bg-panel: #ffffff;      /* 에디터 배경 (흰색) */
            --border-color: #e5e7eb;  /* 테두리 색상 */
            --text-main: #1f2937;     /* 기본 텍스트 (거의 검은색) */
            --text-sub: #6b7280;      /* 보조 텍스트 */
            --input-bg: #f9fafb;      /* 입력칸 배경 */
        }

        /* --- 프리뷰 카드 커스텀 컬러 변수 (JS로 제어됨) --- */
        #captureArea {
            --fallback-bg: #d1d5db;     /* 기본 회색 배경 */
            --gradient-base: #000000;   /* 하단 그라데이션 베이스 색상 (검정) */
            --badge-bg: #E91E63;        /* 뱃지 배경색 (핑크) */
            --badge-text: #ffffff;      /* 뱃지 텍스트색 (흰색) */
            --card-primary-text: #ffffff; /* 이름, 캐치프레이즈 텍스트색 (흰색) */
            --threat-level-text: #E91E63; /* 위협 등급 텍스트색 (핑크) */
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            flex-wrap: wrap;
        }

        /* ---------------------------------
           1. 왼쪽: 화이트 UI 에디터 패널
        --------------------------------- */
        .editor-panel {
            background-color: var(--bg-panel);
            padding: 32px;
            border-radius: 20px;
            width: 380px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .editor-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .editor-header img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .editor-header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
        }

        .editor-section {
            margin-bottom: 25px;
        }

        .editor-section-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-group input[type="text"], 
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-main);
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .form-group input[type="file"] {
            width: 100%;
            padding: 10px 0;
            font-size: 14px;
            color: var(--text-sub);
            cursor: pointer;
        }

        /* 색상 선택기 스타일 */
        .color-picker-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .color-picker-item {
            display: flex;
            align-items: center;
            gap: 8px;
            width: calc(50% - 6px);
            margin-bottom: 5px;
        }

        .color-picker-item input[type="color"] {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            padding: 0;
            cursor: pointer;
            box-shadow: inset 0 0 0 1px var(--border-color);
        }

        .color-picker-item label {
            font-size: 13px;
            color: var(--text-sub);
            margin: 0;
            flex: 1;
        }

        .form-group input[type="text"]:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6; /* Focus시 파란색 포인트 */
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
        }

        .form-group textarea {
            resize: none;
            line-height: 1.6;
        }

        .download-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--text-main);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s, transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(17, 24, 39, 0.1);
        }

        .download-btn:hover {
            background-color: #111827;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(17, 24, 39, 0.15);
        }

        /* ---------------------------------
           2. 오른쪽: 결과물 카드 (패턴 없음, 커스텀 컬러)
        --------------------------------- */
        .preview-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phrase-container {
            width: 800px;
            height: 600px;
            position: relative;
            background-color: var(--fallback-bg); /* 커스텀 배경색 */
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
        }

        /* 업로드된 캐릭터 이미지 */
        .character-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            display: none; /* 초기에는 숨김 */
        }

        /* 텍스트 가독성을 위한 하단 그라데이션 (커스텀 베이스 색상, 패턴 제거됨) */
        .text-overlay-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%;
            /* 투명에서 커스텀 그라데이션 베이스 색상으로 */
            background: linear-gradient(to bottom, transparent, var(--gradient-base));
            z-index: 2;
            pointer-events: none;
        }

        /* 텍스트 내용 컨테이너 */
        .text-content-container {
            position: absolute;
            bottom: 40px;
            left: 50px;
            right: 50px;
            z-index: 3;
            text-align: left;
        }

        /* --- 프리뷰 카드 모든 글씨 그림자 효과 --- */
        .preview-text-shadow {
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        .class-badge {
            position: absolute;
            top: 40px;
            right: 40px;
            background-color: var(--badge-bg); /* 커스텀 뱃지 배경색 */
            color: var(--badge-text);      /* 커스텀 뱃지 텍스트색 */
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 800;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            z-index: 4;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* 숨김 처리용 클래스 */
        .hidden {
            display: none !important;
        }

        /* THREAT LEVEL (테두리와 배경 제거됨, 커스텀 텍스트색) */
        .threat-level {
            display: inline-block;
            margin-bottom: 14px;
            font-size: 17px;
            font-weight: 700;
            color: var(--threat-level-text); /* 커스텀 텍스트색 */
            text-transform: uppercase;
            letter-spacing: 1.8px;
            /* 테두리와 배경 완전히 제거 */
            border: none; 
            padding: 0;
        }

        .character-name {
            font-size: 88px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin: 0 0 18px 0;
            line-height: 1;
            color: var(--card-primary-text); /* 커스텀 텍스트색 */
        }

        .catchphrase {
            font-size: 20px;
            line-height: 1.7;
            margin: 0;
            color: var(--card-primary-text); /* 커스텀 텍스트색, 살짝 투명도 조절 */
            opacity: 0.98;
            white-space: pre-wrap;
            font-weight: 400;
            word-break: keep-all;
        }
    </style>
</head>
<body>

    <div class="editor-panel">
        <div class="editor-header">
            <img src="descriptive_logo_image_here.png" alt="ARCH 로고">
            <h1>ARCH 캐치프레이즈 에디터</h1>
        </div>

        <div class="editor-section">
            <h2 class="editor-section-title">1. 콘텐츠 입력</h2>
            
            <div class="form-group">
                <label>배경 이미지 업로드</label>
                <input type="file" id="imgInput" accept="image/*">
            </div>

            <div class="form-group">
                <label>CLASS (우측 상단)</label>
                <input type="text" id="classInput" placeholder="예: S-CLASS ENTITY">
            </div>

            <div class="form-group">
                <label>위협 등급 (THREAT LEVEL)</label>
                <input type="text" id="threatInput" placeholder="예: CHAOTIC">
            </div>

            <div class="form-group">
                <label>이름 (NAME)</label>
                <input type="text" id="nameInput" placeholder="이름을 입력하세요">
            </div>

            <div class="form-group">
                <label>캐치프레이즈</label>
                <textarea id="phraseInput" rows="5" placeholder="캐치프레이즈를 입력하세요 (엔터로 줄바꿈)"></textarea>
            </div>
        </div>

        <div class="editor-section">
            <h2 class="editor-section-title">2. 디자인 커스텀 (색상)</h2>
            <div class="color-picker-group">
                
                <div class="color-picker-item">
                    <input type="color" id="fallbackBgInput" value="#d1d5db">
                    <label>기본 배경색</label>
                </div>

                <div class="color-picker-item">
                    <input type="color" id="gradientBaseInput" value="#000000">
                    <label>하단 그라데이션 베이스</label>
                </div>

                <div class="color-picker-item">
                    <input type="color" id="badgeBgInput" value="#E91E63">
                    <label>뱃지 배경색</label>
                </div>

                <div class="color-picker-item">
                    <input type="color" id="badgeTextInput" value="#ffffff">
                    <label>뱃지 텍스트색</label>
                </div>

                <div class="color-picker-item">
                    <input type="color" id="cardPrimaryTextInput" value="#ffffff">
                    <label>이름 & 캐치프레이즈색</label>
                </div>

                <div class="color-picker-item">
                    <input type="color" id="threatLevelInput" value="#E91E63">
                    <label>위협 등급색</label>
                </div>

            </div>
        </div>

        <button class="download-btn" id="downloadBtn">고화질 이미지 저장</button>
    </div>

    <div class="preview-panel">
        <div class="phrase-container" id="captureArea">
            
            <img src="" alt="" class="character-image" id="previewImg">
            
            <div class="text-overlay-bottom"></div>

            <div class="class-badge hidden preview-text-shadow" id="previewClassBadge"></div>
            
            <div class="text-content-container">
                <div class="threat-level hidden preview-text-shadow" id="previewThreatBox">[ THREAT LEVEL: <span id="previewThreat"></span> ]</div>
                <h1 class="character-name preview-text-shadow" id="previewName"></h1>
                <p class="catchphrase preview-text-shadow" id="previewPhrase"></p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 색상 실시간 동기화 처리 ---
        function syncColor(inputId, cssVarName) {
            const picker = document.getElementById(inputId);
            picker.addEventListener('input', function(e) {
                document.getElementById('captureArea').style.setProperty(cssVarName, e.target.value);
            });
            // 초기값 설정
            document.getElementById('captureArea').style.setProperty(cssVarName, picker.value);
        }

        syncColor('fallbackBgInput', '--fallback-bg');
        syncColor('gradientBaseInput', '--gradient-base');
        syncColor('badgeBgInput', '--badge-bg');
        syncColor('badgeTextInput', '--badge-text');
        syncColor('cardPrimaryTextInput', '--card-primary-text');
        syncColor('threatLevelInput', '--threat-level-text');

        // --- 2. 이미지 업로드 처리 ---
        document.getElementById('imgInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const imgEl = document.getElementById('previewImg');
                    imgEl.src = event.target.result;
                    imgEl.style.display = 'block'; // 이미지가 로드되면 보이게 함
                }
                reader.readAsDataURL(file);
            }
        });

        // --- 3. 텍스트 입력 실시간 동기화 및 빈 값 처리 ---
        function syncText(inputId, previewId, wrapperId = null) {
            document.getElementById(inputId).addEventListener('input', function(e) {
                const value = e.target.value;
                const previewEl = document.getElementById(previewId);
                const wrapperEl = wrapperId ? document.getElementById(wrapperId) : previewEl;
                
                previewEl.innerText = value;

                // 값이 비어있으면 요소를 숨겨서 불필요한 브라켓이 안 보이게 함
                if (value.trim() === '') {
                    wrapperEl.classList.add('hidden');
                } else {
                    wrapperEl.classList.remove('hidden');
                }
            });
        }

        syncText('classInput', 'previewClassBadge');
        syncText('threatInput', 'previewThreat', 'previewThreatBox');
        syncText('nameInput', 'previewName');
        syncText('phraseInput', 'previewPhrase');

        // --- 4. 고화질 다운로드 기능 ---
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const captureArea = document.getElementById('captureArea');
            const btn = document.getElementById('downloadBtn');
            const nameValue = document.getElementById('nameInput').value || '캐치프레이즈';
            
            const originalText = btn.innerText;
            btn.innerText = "저장 중...";
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none";

            html2canvas(captureArea, {
                scale: 3, 
                backgroundColor: null, // 커스텀 배경색을 유지하기 위해 null로 설정
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = nameValue + '_포스터.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                btn.innerText = originalText;
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
            });
        });
    </script>
</body>
</html>
